<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 310" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">How Meridian routes a request</title>
  <desc id="desc">A request travels from your client through Meridian and the Claude Code SDK to Claude, then streams back.</desc>
  <defs>
    <marker id="blue-arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0L8 4 0 8Z" fill="#1E5EFF"/>
    </marker>
    <marker id="orange-arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0L8 4 0 8Z" fill="#DE5B36"/>
    </marker>
    <style>
      .sans { font-family: 'Instrument Sans', Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .mono { font-family: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace; }
      .card-title { font-size: 14px; font-weight: 650; fill: #171A18; }
      .detail { font-size: 10px; fill: #68706B; }
      .endpoint { font-size: 9.5px; fill: #1E5EFF; }
      .tag { font-size: 8px; font-weight: 650; letter-spacing: 1.1px; fill: #7A827C; }
      .route-label { font-size: 7.5px; letter-spacing: .2px; fill: #7A827C; text-anchor: middle; }
    </style>
  </defs>

  <rect width="920" height="310" rx="16" fill="#F3EFE6"/>
  <rect x=".75" y=".75" width="918.5" height="308.5" rx="15.25" stroke="#171A18" stroke-opacity=".14" stroke-width="1.5"/>
  <text class="sans" x="24" y="38" font-size="18" font-weight="650" fill="#171A18">How Meridian routes a request</text>
  <g class="mono" font-size="8.5" fill="#68706B">
    <circle cx="735" cy="32" r="3" fill="#1E5EFF"/><text x="745" y="35">REQUEST</text>
    <circle cx="821" cy="32" r="3" fill="#DE5B36"/><text x="831" y="35">RESPONSE</text>
  </g>

  <rect x="24" y="68" width="174" height="154" rx="12" fill="#FAF8F2" stroke="#D7D2C8"/>
  <rect x="250" y="68" width="174" height="154" rx="12" fill="#EEF2FF" stroke="#1E5EFF" stroke-width="1.5"/>
  <rect x="476" y="68" width="194" height="154" rx="12" fill="#FAF8F2" stroke="#D7D2C8"/>
  <rect x="722" y="68" width="174" height="154" rx="12" fill="#FAF8F2" stroke="#D7D2C8"/>

  <g class="sans" font-size="9" font-weight="700" text-anchor="middle">
    <circle cx="42" cy="78" r="10" fill="#171A18"/><text x="42" y="81.5" fill="#F3EFE6">1</text>
    <circle cx="268" cy="78" r="10" fill="#1E5EFF"/><text x="268" y="81.5" fill="#FFFFFF">2</text>
    <circle cx="494" cy="78" r="10" fill="#171A18"/><text x="494" y="81.5" fill="#F3EFE6">3</text>
    <circle cx="740" cy="78" r="10" fill="#171A18"/><text x="740" y="81.5" fill="#F3EFE6">4</text>
  </g>

  <g text-anchor="middle">
    <text class="sans card-title" x="111" y="112">Your client</text>
    <text class="mono endpoint" x="111" y="135">Anthropic / OpenAI</text>
    <text class="sans detail" x="111" y="160">OpenCode, Cline, Crush,</text>
    <text class="sans detail" x="111" y="176">Aider, Pi, or your own tool</text>
    <text class="sans tag" x="111" y="207">STANDARD API</text>

    <g transform="translate(325 88) scale(1)">
      <path d="M3 6H6.75C8.3 6 9 8.4 10.125 9.75 M13.875 14.25C15 15.6 15.7 18 17.25 18H21" stroke="#1E5EFF" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M3 18H6.75C8.3 18 9 15.6 10.125 14.25 M13.875 9.75C15 8.4 15.7 6 17.25 6H21" stroke="#DE5B36" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text class="sans card-title" x="337" y="127">Meridian</text>
    <text class="mono endpoint" x="337" y="147">localhost:3456</text>
    <text class="sans detail" x="337" y="172">Normalizes and routes</text>
    <text class="sans tag" x="337" y="207">PROTOCOL SEAM</text>

    <text class="sans card-title" x="573" y="112">Claude Code SDK</text>
    <text class="mono endpoint" x="573" y="135">@anthropic-ai/claude-code</text>
    <text class="sans detail" x="573" y="160">Official SDK handles auth,</text>
    <text class="sans detail" x="573" y="176">sessions, caching, and tools</text>
    <text class="sans tag" x="573" y="207">SDK CALL</text>

    <text class="sans card-title" x="809" y="112">Claude</text>
    <text class="mono endpoint" x="809" y="135">api.anthropic.com</text>
    <text class="sans detail" x="809" y="160">Opus, Sonnet, Haiku,</text>
    <text class="sans detail" x="809" y="176">and extended thinking</text>
    <text class="sans tag" x="809" y="207">YOUR SUBSCRIPTION</text>
  </g>

  <g stroke-linecap="round">
    <path d="M204 116H244" stroke="#1E5EFF" stroke-width="1.75" marker-end="url(#blue-arrow)"/>
    <path d="M244 164H204" stroke="#DE5B36" stroke-width="1.35" marker-end="url(#orange-arrow)"/>
    <path d="M430 116H470" stroke="#1E5EFF" stroke-width="1.75" marker-end="url(#blue-arrow)"/>
    <path d="M470 164H430" stroke="#DE5B36" stroke-width="1.35" marker-end="url(#orange-arrow)"/>
    <path d="M676 116H716" stroke="#1E5EFF" stroke-width="1.75" marker-end="url(#blue-arrow)"/>
    <path d="M716 164H676" stroke="#DE5B36" stroke-width="1.35" marker-end="url(#orange-arrow)"/>
  </g>
  <g class="mono route-label">
    <text x="224" y="106">API</text><text x="224" y="181">SSE</text>
    <text x="450" y="106">SDK</text><text x="450" y="181">RESULT</text>
    <text x="696" y="106">CALL</text><text x="696" y="181">STREAM</text>
  </g>

  <path d="M24 252H896" stroke="#171A18" stroke-opacity=".12"/>
  <circle cx="196" cy="278" r="3" fill="#72A988"/>
  <text class="sans" x="460" y="282" text-anchor="middle" font-size="11" fill="#68706B">No API keys needed — authenticates through your existing Claude Code / Max subscription</text>
</svg>
