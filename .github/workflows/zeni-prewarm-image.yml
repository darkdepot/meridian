name: Zeni prewarm image

on:
  push:
    branches:
      - codex/sdk-prewarm
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/amd64 canary
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:zeni-prewarm
            ghcr.io/${{ github.repository }}:zeni-prewarm-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
